kind = "web"
previewPath = "/"
title = "LearnLedger"
version = "1.0.0"
id = "artifacts/learn-ledger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22035

[services.development]
run = "pnpm --filter @workspace/learn-ledger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/learn-ledger", "run", "build" ]
publicDir = "artifacts/learn-ledger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22035"
BASE_PATH = "/"
